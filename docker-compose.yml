services:
  bot:
    build: .
    image: hh-pars-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_PROXY_URL: socks5://warp:1080
    depends_on:
      db:
        condition: service_healthy
      warp:
        condition: service_started

  # SOCKS5-прокси через Cloudflare WARP — нужен там, где Telegram API
  # заблокирован на уровне сети/хостера. Бот ходит в Telegram через него.
  warp:
    image: caomingjun/warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp_data:/var/lib/cloudflare-warp

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hh}
      POSTGRES_DB: ${POSTGRES_DB:-hh_pars}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hh}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Веб-панель для просмотра БД. Порт пробрасывается только на loopback —
  # снаружи (даже из локальной сети) недоступна, только с самой машины.
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db

volumes:
  db_data:
  warp_data:
